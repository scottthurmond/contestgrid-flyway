# Local lab database (contest_lab)
# Usage (from flyway/):
#   export CONTEST_LAB_DB_PASSWORD='...'
#   flyway -configFiles=conf/flyway-contest-lab.conf info
#   flyway -configFiles=conf/flyway-contest-lab.conf migrate

flyway.url=jdbc:postgresql://localhost:5432/contest_lab
flyway.user=contestgrid_lab_id
flyway.password=${CONTEST_LAB_DB_PASSWORD}

flyway.schemas=app
flyway.locations=filesystem:./db/migrations

# Safe defaults for local dev
flyway.baselineOnMigrate=true
flyway.baselineVersion=0
flyway.encoding=UTF-8
flyway.validateOnMigrate=true
flyway.cleanDisabled=true
flyway.outOfOrder=false
